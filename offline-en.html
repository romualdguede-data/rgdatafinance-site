<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <title>Offline – RG DATA & FINANCE INC.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0A1A2F">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/icon-192.png">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <style>
    /* Structure plein écran temporaire dédiée à la panne réseau */
    .offline-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100%;
      box-sizing: border-box;
      background-color: var(--dark-bg);
      color: #ffffff;
      padding: 20px;
      text-align: center;
    }

    .offline-icon {
      font-size: 4rem;
      color: var(--gold);
      margin-bottom: 20px;
      animation: pulse 2s infinite;
    }

    .offline-container h1 {
      font-size: 2rem;
      margin-bottom: 15px;
      color: #ffffff;
    }

    .offline-container p {
      font-size: 1.1rem;
      max-width: 500px;
      margin-bottom: 30px;
      color: #e0e0e0;
    }

    .btn-retry {
      background-color: transparent;
      border: 2px solid var(--gold);
      color: var(--gold);
      padding: 12px 24px;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 600;
      font-size: 1rem;
      transition: var(--transition);
    }

    .btn-retry:hover {
      background-color: var(--gold);
      color: var(--dark-bg);
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
  </style>
</head>

<body>

  <div class="offline-container">
    <!-- Icône visuelle de connexion manquante -->
    <div class="offline-icon">📡</div>
    
    <h1>You are currently offline</h1>
    
    <p>It looks like your internet connection is unavailable. Pages you have previously visited remain accessible offline.</p>
    
    <!-- Bouton pour recharger la page dès que le réseau revient -->
    <button class="btn-retry" onclick="window.location.reload();">Try Again</button>
  </div>

</body>
</html>
