<html lang="en" dir="ltr">

  <meta charset="UTF-8">

  <link class="canonical" href="https://www.rgdatafinance.com/index-en.html">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0A1A2F">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/icon-192.png">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- EXCLUSIVE FULLSCREEN HOMEPAGE -->
  <header class="homepage-fullscreen">
    
    <!-- Dark Mode (desktop) -->
    <button id="theme-toggle" class="theme-toggle desktop-only" aria-label="Toggle theme" style="position: absolute; top: 20px; left: 20px; background: none; border: none; font-size: 1.5rem; cursor: pointer;">
      <span id="theme-icon">🌙</span>
    </button>

    <!-- Language Switch -->
    <div class="lang-switch">
      <a href="index.html">FR</a>
    </div>

    <!-- Hamburger for mobile menu -->
    <button class="hamburger" onclick="toggleMenu()" aria-label="Open menu">☰</button>

    <!-- Central Content Area -->
    <div class="hero-content">
      <!-- Point 4: Displayed right above the logo -->
      <h1 class="tagline">Transform your data into financial opportunities</h1>
      
      <!-- Company Logo -->
      <div class="logo-container"></div>
      
      <!-- Point 5: Positioned right below the logo -->
      <p class="subtitle">Economic Analysis & Data Intelligence</p>
      
      <!-- Point 6: Action button positioned right above navigation -->
      <div class="cta-container">
        <a href="offers-en.html" class="btn">Discover our services and book an appointment</a>
      </div>
    </div>

    <!-- Point 2 & 7: Navigation pushed completely to the bottom, without white bar -->

      <a href="index-en.html" class="active">Home</a>

  </header>

  <!-- Rest of the site if applicable -->

<!-- SCRIPT MOBILE MENU -->
<script>
function toggleMenu() {
  document.getElementById("mobileMenu").classList.toggle("open");
}
</script>

<!-- SCRIPT DARK MODE -->
<script>
function applyTheme(savedTheme, prefersDark, icon, iconMobile) {
    if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
        document.body.classList.add('dark-mode');
        icon.textContent = '☀️';
        if (iconMobile) iconMobile.textContent = '☀️';
    } else {
        document.body.classList.remove('dark-mode');
        icon.textContent = '🌙';
        if (iconMobile) iconMobile.textContent = '🌙';
    }
}

const toggleBtn = document.getElementById('theme-toggle');
const toggleBtnMobile = document.getElementById('theme-toggle-mobile');
const icon = document.getElementById('theme-icon');
const iconMobile = document.getElementById('theme-icon-mobile');

const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
const savedTheme = localStorage.getItem('theme');

applyTheme(savedTheme, prefersDark, icon, iconMobile);

function toggleTheme() {
    document.body.classList.toggle('dark-mode');
    const isDark = document.body.classList.contains('dark-mode');

    icon.textContent = isDark ? '☀️' : '🌙';
    if (iconMobile) iconMobile.textContent = isDark ? '☀️' : '🌙';

    localStorage.setItem('theme', isDark ? 'dark' : 'light');
}

toggleBtn.addEventListener('click', toggleTheme);
if (toggleBtnMobile) toggleBtnMobile.addEventListener('click', toggleTheme);
</script>

</body>
</html>
